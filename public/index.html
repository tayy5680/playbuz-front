<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Language" content="zh-TW" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="<%=htmlWebpackPlugin.options.img_url%>/img/favicon.ico" />
    <title>
      <%=htmlWebpackPlugin.options.title%>
    </title>
    <meta name="description" content="<%=htmlWebpackPlugin.options.description%>" />
    <meta name="keywords" content="<%=htmlWebpackPlugin.options.keyword%>" />
    <meta property="og:title" content="<%=htmlWebpackPlugin.options.og_title%>" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="<%=htmlWebpackPlugin.options.description%>" />
    <meta property="og:url" content="<%=htmlWebpackPlugin.options.site_url%>" />
    <meta property="og:site_name" content="<%= htmlWebpackPlugin.options.title %>" />
    <meta name="robots" content="noimageindex" />
    <meta name="googlebot" content="max-image-preview:none" />
    <meta property="og:image" content="<%=htmlWebpackPlugin.options.img_url%>/img/og-image.jpg?v=1.0" />
    <meta property="og:image:type" content="image/jpg" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:locale:alternate" content="en_US" />
    <link rel="alternate" hreflang="zh-TW" href="<%=htmlWebpackPlugin.options.site_tw_url%>" />
    <link rel="alternate" hreflang="en-US" href="<%=htmlWebpackPlugin.options.site_singapore_url%>" />
    <link rel="alternate" hreflang="x-default" href="<%=htmlWebpackPlugin.options.site_url%>" />
    <link rel="canonical" href="<%= htmlWebpackPlugin.options.site_url %>" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="google-adsense-account" content="ca-pub-8365593385231092" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="<%=htmlWebpackPlugin.options.title%>" />
    <meta name="twitter:description" content="<%=htmlWebpackPlugin.options.description%>" />
    <meta name="twitter:image" content="<%=htmlWebpackPlugin.options.img_url%>/img/og-image.jpg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/48x48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/180x180.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="144x144"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/144x144.png"
    />
    <link
      rel="mask-icon"
      href="<%=htmlWebpackPlugin.options.img_url%>/img/icons/<%=htmlWebpackPlugin.options.title%>/1024x1024.png"
      color="#000000"
    />

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8365593385231092"
      crossorigin="anonymous"
    ></script>

    <!-- apple-pay-sdk -->
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>

    <!-- apple pay 網域驗證 meta tag -->
    <!-- <meta
      name="apple-pay-domain-validation"
      content="https://cubegame.app/.well-known/apple-developer-merchantid-domain-association.txt"
    /> -->
  </head>

  <body>
    <noscript>
      <strong
        >We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please
        enable it to continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <div id="pop-view__teleport"></div>
    <!-- built files will be auto injected -->
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <script type="text/javascript">
      ;(function(c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||
          function() {
            ;(c[a].q = c[a].q || []).push(arguments)
          }
        t = l.createElement(r)
        t.async = 1
        t.src = 'https://www.clarity.ms/tag/' + i
        y = l.getElementsByTagName(r)[0]
        y.parentNode.insertBefore(t, y)
      })(window, document, 'clarity', 'script', '<%=htmlWebpackPlugin.options.clarity_code%>')
    </script>
  </body>
</html>
